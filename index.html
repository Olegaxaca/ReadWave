<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReadWave — Твое пространство для чтения</title>
    <style>
        /* --- Базовые настройки --- */
        :root {
            --bg-deep: #05070a;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* --- ТОЧНЫЙ ДИЗАЙН ФОНА --- */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: var(--bg-deep);
        }

        /* Пятна света как на скриншоте */
        .light-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: drift 25s infinite alternate ease-in-out;
        }

        /* Бирюзовый сверху слева */
        .blob-1 {
            width: 45vw; height: 45vw;
            top: -10%; left: -5%;
            background: radial-gradient(circle, #00ced1 0%, transparent 70%);
        }

        /* Мятный в центре слева */
        .blob-2 {
            width: 40vw; height: 40vw;
            top: 30%; left: -15%;
            background: radial-gradient(circle, #43ffaf 0%, transparent 70%);
            opacity: 0.3;
            animation-duration: 35s;
        }

        /* Яркий синий снизу справа */
        .blob-3 {
            width: 55vw; height: 55vw;
            bottom: -10%; right: -10%;
            background: radial-gradient(circle, #0047ff 0%, transparent 70%);
            opacity: 0.6;
        }

        @keyframes drift {
            from { transform: translate(0, 0) rotate(0deg) scale(1); }
            to { transform: translate(50px, 30px) rotate(10deg) scale(1.1); }
        }

        /* Зернистость (Grain) */
        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05;
            pointer-events: none;
            z-index: 0;
        }

        /* --- ИНТЕРФЕЙС --- */
        .content {
            position: relative;
            z-index: 10;
            max-width: 500px;
            width: 90%;
            margin-top: 15vh;
            text-align: center;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 50px 30px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
        }

        .app-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            border-radius: 24px;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            box-shadow: 0 20px 40px rgba(0, 163, 255, 0.3);
        }

        h1 {
            font-size: 2.2rem;
            letter-spacing: -1px;
            margin-bottom: 15px;
        }

        .description {
            color: var(--text-dim);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        /* Кнопка RuStore */
        .btn-download {
            display: inline-flex;
            align-items: center;
            background: #ffffff;
            color: #000;
            padding: 18px 35px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .btn-download:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.2);
            background: #f0f0f0;
        }

        .btn-download img {
            width: 24px;
            margin-right: 12px;
        }

        .features {
            margin-top: 50px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .feature-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 24px;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        footer {
            margin-top: auto;
            padding: 40px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

    <div class="background-container">
        <div class="light-blob blob-1"></div>
        <div class="light-blob blob-2"></div>
        <div class="light-blob blob-3"></div>
    </div>
    <div class="noise"></div>

    <div class="content">
        <div class="glass-card">
            <div class="app-icon">📖</div>
            <h1>ReadWave</h1>
            <p class="description">
                Твой персональный океан книг. Читай с комфортом, настраивай под себя и погружайся в сюжет без лишних деталей.
            </p>
            
            <a href="https://www.rustore.ru/catalog/app/com.readwave" class="btn-download" target="_blank">
                <span>Скачать в RuStore</span>
            </a>
        </div>

        <div class="features">
            <div class="feature-item">
                <strong>Minimal UI</strong><br>Ничего лишнего
            </div>
            <div class="feature-item">
                <strong>Light Speed</strong><br>Работает быстро
            </div>
        </div>
    </div>

    <footer>
        © 2026 ReadWave Project
    </footer>

</body>
</html>
